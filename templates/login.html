{% extends 'base.html' %}
{% block title %}Login - Healthcare Security{% endblock %}
{% block content %}
<style>
    .login-wrap {
        max-width: 440px;
        margin: 3.5rem auto;
        animation: fadeUp 0.5s ease;
    }
    .login-hero {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-icon-box {
        width: 64px; height: 64px;
        background: var(--primary);
        display: inline-flex; align-items: center; justify-content: center;
        margin-bottom: 1.2rem;
        animation: fadeUp 0.4s ease;
    }
    .login-icon-box i { color: white; font-size: 1.6rem; }
    .login-hero h1 { font-size: 1.9rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .login-hero p  { color: var(--text-muted); font-size: 0.93rem; margin-top: 0.3rem; }
    .secure-bar {
        background: var(--accent-light);
        border-left: 4px solid var(--accent);
        padding: 0.75rem 1rem;
        margin-bottom: 1.5rem;
        font-size: 0.87rem;
        font-weight: 600;
        color: #00348a;
        display: flex; align-items: center; gap: 0.5rem;
    }
    .form-group { margin-bottom: 1.3rem; }
    .btn-full { width: 100%; padding: 0.8rem; font-size: 0.95rem; margin-top: 0.5rem; }
    .login-foot {
        text-align: center;
        margin-top: 1.8rem;
        padding-top: 1.5rem;
        border-top: 1.5px solid var(--border);
        font-size: 0.88rem;
        color: var(--text-muted);
    }
    .hint-box {
        background: #fffbe8;
        border: 1.5px solid var(--warning);
        padding: 0.7rem 1rem;
        margin-top: 1rem;
        font-size: 0.84rem;
        color: #7a4a00;
        font-family: 'DM Mono', monospace;
        font-weight: 500;
    }
</style>

<div class="login-wrap">
    <div class="login-hero">
        <div class="login-icon-box"><i class="fas fa-lock"></i></div>
        <h1>Welcome Back</h1>
        <p>Sign in to Healthcare Security Portal</p>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="secure-bar">
                <i class="fas fa-shield-alt"></i> Your credentials are encrypted and secure
            </div>
            <form method="post" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label" for="username"><i class="fas fa-user"></i> &nbsp;Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password"><i class="fas fa-key"></i> &nbsp;Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-arrow-right"></i> &nbsp; Continue to MFA
                </button>
            </form>
        </div>
    </div>

    <div class="login-foot">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
       
    </div>
</div>
{% endblock %}
